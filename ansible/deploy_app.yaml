---
- name: Configure Warpnet SRE Flask app
  hosts: all
  become: true

  vars_prompt:
    - name: APP_SECRET
      prompt: "What is your flask app secret?"
      private: true
      confirm: true

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: true

    - name: Restart flaskapp
      systemd:
        name: flaskapp
        state: restarted
        enabled: true

  tasks:
    - name: Install Python dependencies
      apt:
        pkg:
          - python3
          - python3-pip
          - python3-venv
          - git
        state: present
        update_cache: true

    - name: Create flaskapp user
      user:
        name: flaskapp
        system: true
        create_home: false
        shell: /usr/sbin/nologin

    - name: Create app directory
      file:
        path: /opt/flaskapp
        state: directory
        owner: flaskapp
        group: flaskapp
        mode: "0755"

    - name: Clone application repository
      git:
        repo: "https://github.com/TheNinjaTuna/sre-challenge"
        dest: /opt/flaskapp
        version: main

    - name: Set ownership on app directory
      file:
        path: /opt/flaskapp
        owner: flaskapp
        group: flaskapp
        recurse: true

    - name: Create Python virtual environment
      command:
        cmd: python3 -m venv /opt/flaskapp/venv
        creates: /opt/flaskapp/venv

    - name: Install Python requirements into venv
      pip:
        requirements: /opt/flaskapp/sre-challenge/app/requirements.txt
        virtualenv: /opt/flaskapp/venv

    - name: Create systemd service
      template:
        src: flaskapp.service.j2
        dest: /etc/systemd/system/flaskapp.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart flaskapp

    - name: Ensure flaskapp service is started
      systemd:
        name: flaskapp
        state: started
        enabled: true
