version: "3.9"

services:
  web:
    build: .
    image: theninjatuna/warpnet-sre-challenge:latest
    container_name: flaskapp

    ports:
      - "5000:5000"

    environment:
      - SQLITE_DB_PATH=/data/app.db
      - PYTHONUNBUFFERED=1

    volumes:
      - ./data:/data

    command: >
      gunicorn -w 2 -b 0.0.0.0:5000
      --access-logfile -
      --error-logfile -
      --log-level info
      application:app
